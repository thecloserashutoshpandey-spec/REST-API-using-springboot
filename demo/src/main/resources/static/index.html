<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration - GN Campus</title>
    <style>
        .error { color: red; font-size: 0.8em; margin-left: 10px; }
        .success { color: green; font-weight: bold; }
        .input-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; text-align: right; margin-right: 15px; }
        input[type="text"], input[type="email"], input[type="date"], select { width: 300px; }
    </style>
</head>
<body>
<h2>GN Campus Student Registration</h2>
<p>Please fill details. Roll Number and Registration Date are generated automatically.</p>

<div id="statusMessage"></div>

<form id="registrationForm">
    <div class="input-group">
        <label>First Name:</label>
        <input type="text" id="firstName" required>
        <span id="firstNameError" class="error"></span>
    </div>

    <div class="input-group">
        <label>Last Name:</label>
        <input type="text" id="lastName" required>
        <span id="lastNameError" class="error"></span>
    </div>

    <div class="input-group">
        <label>Date of Birth:</label>
        <input type="date" id="dateOfBirth" required>
        <span id="dobError" class="error"></span>
    </div>

    <div class="input-group">
        <label>Gender:</label>
        <select id="gender" required>
            <option value="">--Select--</option>
            <option value="MALE">Male</option>
            <option value="FEMALE">Female</option>
            <option value="OTHERS">Others</option>
        </select>
        <span id="genderError" class="error"></span>
    </div>

    <div class="input-group">
        <label>Phone (10 digits):</label>
        <input type="text" id="phone" pattern="\d{10}" required>
        <span id="phoneError" class="error"></span>
    </div>

    <div class="input-group">
        <label>Email:</label>
        <input type="email" id="email" required>
        <span id="emailError" class="error"></span>
    </div>

    <div class="input-group">
        <label>Class Level (1-12):</label>
        <select id="classLevel" required>
            <option value="">--Select--</option>
            <option value="1">Class 1</option>
            <option value="2">Class 2</option>
            <option value="12">Class 12</option>
        </select>
        <span id="classError" class="error"></span>
    </div>

    <div class="input-group">
        <button type="submit">Register Now</button>
    </div>
</form>

<script>
    document.getElementById('registrationForm').addEventListener('submit', async function(event) {
        event.preventDefault(); // Prevent standard form submission

        // Clear previous errors and messages
        const errorSpans = document.querySelectorAll('.error');
        errorSpans.forEach(span => span.textContent = '');
        const statusMessage = document.getElementById('statusMessage');
        statusMessage.textContent = '';
        statusMessage.className = '';

        // 1. Gather Data
        const formData = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            dateOfBirth: document.getElementById('dateOfBirth').value,
            gender: document.getElementById('gender').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            classLevel: parseInt(document.getElementById('classLevel').value)
        };

        // 2. Send POST Request
        try {
            const response = await fetch('http://localhost:8080/students/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            // 3. Handle Response
            if (response.ok) {
                const student = await response.json();
                statusMessage.textContent = `Registration Successful! Roll Number: ${student.rollNo}`;
                statusMessage.className = 'success';
                document.getElementById('registrationForm').reset(); // Clear form
            } else {
                const errorData = await response.json(); // Map<String, String> of field errors

                // Display specific backend validation errors
                if (errorData.firstName) document.getElementById('firstNameError').textContent = errorData.firstName;
                if (errorData.lastName) document.getElementById('lastNameError').textContent = errorData.lastName;
                if (errorData.dateOfBirth) document.getElementById('dobError').textContent = errorData.dateOfBirth;
                if (errorData.gender) document.getElementById('genderError').textContent = errorData.gender;
                if (errorData.phone) document.getElementById('phoneError').textContent = errorData.phone;
                if (errorData.email) document.getElementById('emailError').textContent = errorData.email;
                if (errorData.classLevel) document.getElementById('classError').textContent = errorData.classLevel;

                statusMessage.textContent = "Registration Failed. Please correct errors.";
                statusMessage.className = 'error';
            }
        } catch (error) {
            console.error('Error during registration:', error);
            statusMessage.textContent = "A network error occurred.";
            statusMessage.className = 'error';
        }
    });
</script>
</body>
</html>
